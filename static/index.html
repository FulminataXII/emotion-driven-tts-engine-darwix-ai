<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion-Driven TTS</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            resize: none;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: #333399;
            box-shadow: 0 0 0 4px rgba(51, 51, 153, 0.1);
        }

        button {
            background-color: #333399;
            color: #ffffff;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #262673;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #9999cc;
            cursor: not-allowed;
            transform: none;
        }

        /* Clean Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #333399;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        audio {
            width: 100%;
            border-radius: 8px;
            display: none;
            outline: none;
        }

        h1 {
            color: #333399;
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Emotion-Driven TTS</h1>
        <textarea id="textInput" placeholder="Enter your text here..."></textarea>
        <button id="generateBtn">Generate Audio</button>
        <div class="loader" id="loader"></div>
        <audio id="audioPlayer" controls></audio>
    </div>

    <script>
        const btn = document.getElementById('generateBtn');
        const textInput = document.getElementById('textInput');
        const loader = document.getElementById('loader');
        const audioPlayer = document.getElementById('audioPlayer');

        btn.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text) return;

            btn.disabled = true;
            loader.style.display = 'block';
            audioPlayer.style.display = 'none';

            try {
                const response = await fetch('/generate-audio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    throw new Error('Failed to generate audio. Check the server logs.');
                }

                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);

                audioPlayer.src = audioUrl;
                audioPlayer.style.display = 'block';
                audioPlayer.play();

            } catch (error) {
                alert(error.message);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>

</html>
